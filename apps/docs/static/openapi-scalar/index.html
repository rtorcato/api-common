<!doctype html>
<html lang="en">
	<head>
		<title>Users API — Scalar reference</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex" />
		<style>
			body {
				margin: 0;
				background: #0b0d12;
			}
		</style>
	</head>
	<body>
		<!--
			Standalone Scalar API Reference, loaded from a static OpenAPI 3.1 spec.
			This is exactly what @rtorcato/api-openapi's docsHtml({ specUrl }) emits —
			the docs site embeds this page in an <iframe> on the homepage + /openapi-demo.
			Served as a directory index (/openapi-scalar/) so it doesn't collide with the
			/openapi-demo page route or get an extension-stripping redirect. `spec.json`
			sits alongside it, referenced relatively.
		-->
		<script id="api-reference" data-url="./spec.json" data-theme="purple"></script>
		<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
	</body>
</html>
