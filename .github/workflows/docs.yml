name: Deploy Docs

# WHEN to deploy lives here; HOW (build + publish to Pages) is the shared
# reusable workflow in @rtorcato/js-tooling, so every sibling docs site stays
# in lockstep. See rtorcato/js-tooling/.github/workflows/docs-deploy.yml
on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/**'
      - 'scripts/aggregate-changelog.mjs'
      - '.github/workflows/docs.yml'
      - 'pnpm-workspace.yaml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: rtorcato/js-tooling/.github/workflows/docs-deploy.yml@main
    with:
      build-filter: '@rtorcato/api-common-docs'
