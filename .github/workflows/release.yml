name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # OIDC trusted publishing needs npm CLI >= 11.5.1; Node 22 ships 10.x.
      # changeset publish -> pnpm publish delegates to this npm.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: authenticates via OIDC trusted publishing (id-token: write
          # above). Requires a trusted publisher registered for THIS workflow file
          # (release.yml) on npmjs.com. Provenance is emitted automatically.
